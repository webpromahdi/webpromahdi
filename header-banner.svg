<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="220" viewBox="0 0 1000 220">
  <defs>
    <!-- Background gradient: dark navy to blue, matching current README -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0F172A"/>
      <stop offset="40%" stop-color="#131D36"/>
      <stop offset="100%" stop-color="#1E3A8A"/>
    </linearGradient>

    <!-- Subtle radial glow behind the name -->
    <radialGradient id="centerGlow" cx="50%" cy="40%" r="45%">
      <stop offset="0%" stop-color="#1E3A8A" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="transparent" stop-opacity="0"/>
    </radialGradient>

    <!-- Animated shine sweep gradient -->
    <linearGradient id="shine" gradientUnits="userSpaceOnUse" x1="-500" y1="0" x2="-300" y2="0">
      <stop offset="0%" stop-color="#E5F3FF" stop-opacity="0"/>
      <stop offset="35%" stop-color="#E5F3FF" stop-opacity="0"/>
      <stop offset="50%" stop-color="#FFFFFF" stop-opacity="0.9"/>
      <stop offset="65%" stop-color="#E5F3FF" stop-opacity="0"/>
      <stop offset="100%" stop-color="#E5F3FF" stop-opacity="0"/>
      <animate attributeName="x1" values="-500;1500" dur="4s" repeatCount="indefinite"/>
      <animate attributeName="x2" values="-300;1700" dur="4s" repeatCount="indefinite"/>
    </linearGradient>

    <!-- Glow filter for the divider line -->
    <filter id="lineGlow" x="-20%" y="-200%" width="140%" height="500%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Soft text shadow filter -->
    <filter id="textShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#38BDF8" flood-opacity="0.3"/>
    </filter>

    <!-- Divider gradient -->
    <linearGradient id="dividerGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#38BDF8" stop-opacity="0"/>
      <stop offset="20%" stop-color="#38BDF8" stop-opacity="0.8"/>
      <stop offset="50%" stop-color="#7DD3FC" stop-opacity="1"/>
      <stop offset="80%" stop-color="#38BDF8" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#38BDF8" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1000" height="220" fill="url(#bg)" rx="0"/>

  <!-- Subtle center glow -->
  <rect width="1000" height="220" fill="url(#centerGlow)"/>

  <!-- Decorative subtle grid dots -->
  <g opacity="0.04" fill="#38BDF8">
    <circle cx="50" cy="30" r="1.5"/>
    <circle cx="150" cy="50" r="1"/>
    <circle cx="250" cy="25" r="1.5"/>
    <circle cx="350" cy="55" r="1"/>
    <circle cx="450" cy="35" r="1.5"/>
    <circle cx="550" cy="45" r="1"/>
    <circle cx="650" cy="30" r="1.5"/>
    <circle cx="750" cy="55" r="1"/>
    <circle cx="850" cy="40" r="1.5"/>
    <circle cx="950" cy="25" r="1"/>
    <circle cx="100" cy="180" r="1"/>
    <circle cx="300" cy="190" r="1.5"/>
    <circle cx="500" cy="195" r="1"/>
    <circle cx="700" cy="185" r="1.5"/>
    <circle cx="900" cy="195" r="1"/>
  </g>

  <!-- Main name text (base layer) -->
  <text x="500" y="95" text-anchor="middle" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="52" font-weight="700" fill="#E5F3FF" filter="url(#textShadow)" letter-spacing="2">Mahdi Al Hasan</text>

  <!-- Shine overlay on the name (animated) -->
  <text x="500" y="95" text-anchor="middle" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="52" font-weight="700" fill="url(#shine)" letter-spacing="2">Mahdi Al Hasan</text>

  <!-- Divider line with glow -->
  <line x1="330" y1="120" x2="670" y2="120" stroke="url(#dividerGrad)" stroke-width="2" filter="url(#lineGlow)"/>

  <!-- Subtitle text -->
  <text x="500" y="158" text-anchor="middle" font-family="'Fira Code', 'Cascadia Code', 'Consolas', monospace" font-size="20" fill="#38BDF8" letter-spacing="3" opacity="0.9">Developer | Tech Explorer</text>

  <!-- Bottom decorative line (very subtle) -->
  <line x1="0" y1="219" x2="1000" y2="219" stroke="#1E3A8A" stroke-width="1" opacity="0.5"/>
</svg>
