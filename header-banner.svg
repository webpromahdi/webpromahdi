<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="220" viewBox="0 0 1000 220">
  <defs>
    <style>
      @keyframes shimmer {
        0% { transform: translateX(-500px); }
        50% { transform: translateX(1000px); }
        100% { transform: translateX(1000px); }
      }

      @keyframes subtleGlow {
        0%, 100% { opacity: 0.15; }
        50% { opacity: 0.35; }
      }

      .shine-layer {
        animation: shimmer 4s ease-in-out infinite;
      }

      .glow-dot {
        animation: subtleGlow 3s ease-in-out infinite;
      }
    </style>

    <!-- Background gradient -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#020c1b"/>
      <stop offset="40%" stop-color="#0a192f"/>
      <stop offset="100%" stop-color="#112240"/>
    </linearGradient>

    <!-- Shine beam gradient (narrow white band) -->
    <linearGradient id="shineGrad" x1="0" y1="0" x2="200" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0"/>
      <stop offset="40%" stop-color="#FFFFFF" stop-opacity="0"/>
      <stop offset="50%" stop-color="#FFFFFF" stop-opacity="0.85"/>
      <stop offset="60%" stop-color="#FFFFFF" stop-opacity="0"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
    </linearGradient>

    <!-- Clip path using the name text -->
    <clipPath id="nameClip">
      <text x="500" y="95" text-anchor="middle" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="52" font-weight="700" letter-spacing="2">Mahdi Al Hasan</text>
    </clipPath>

    <!-- Divider gradient -->
    <linearGradient id="dividerGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#64ffda" stop-opacity="0"/>
      <stop offset="20%" stop-color="#64ffda" stop-opacity="0.8"/>
      <stop offset="50%" stop-color="#64ffda" stop-opacity="1"/>
      <stop offset="80%" stop-color="#64ffda" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#64ffda" stop-opacity="0"/>
    </linearGradient>

    <!-- Line glow filter -->
    <filter id="lineGlow" x="-20%" y="-200%" width="140%" height="500%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Text drop shadow -->
    <filter id="textShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#64ffda" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1000" height="220" fill="url(#bg)"/>

  <!-- Subtle decorative dots -->
  <g fill="#64ffda">
    <circle class="glow-dot" cx="80" cy="35" r="1.5" opacity="0.15"/>
    <circle class="glow-dot" cx="200" cy="55" r="1" opacity="0.1" style="animation-delay: 0.5s"/>
    <circle class="glow-dot" cx="350" cy="28" r="1.5" opacity="0.15" style="animation-delay: 1s"/>
    <circle class="glow-dot" cx="500" cy="45" r="1" opacity="0.1" style="animation-delay: 1.5s"/>
    <circle class="glow-dot" cx="650" cy="32" r="1.5" opacity="0.15" style="animation-delay: 0.3s"/>
    <circle class="glow-dot" cx="800" cy="50" r="1" opacity="0.1" style="animation-delay: 0.8s"/>
    <circle class="glow-dot" cx="920" cy="38" r="1.5" opacity="0.15" style="animation-delay: 1.2s"/>
    <circle class="glow-dot" cx="150" cy="185" r="1" opacity="0.1" style="animation-delay: 0.7s"/>
    <circle class="glow-dot" cx="400" cy="192" r="1.5" opacity="0.15" style="animation-delay: 1.4s"/>
    <circle class="glow-dot" cx="600" cy="188" r="1" opacity="0.1" style="animation-delay: 0.2s"/>
    <circle class="glow-dot" cx="850" cy="195" r="1.5" opacity="0.15" style="animation-delay: 0.9s"/>
  </g>

  <!-- Base name text -->
  <text x="500" y="95" text-anchor="middle" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="52" font-weight="700" fill="#e6f1ff" filter="url(#textShadow)" letter-spacing="2">Mahdi Al Hasan</text>

  <!-- Animated shine beam clipped to the name text shape -->
  <g clip-path="url(#nameClip)">
    <rect class="shine-layer" x="0" y="50" width="200" height="80" fill="url(#shineGrad)"/>
  </g>

  <!-- Divider line with glow -->
  <line x1="330" y1="120" x2="670" y2="120" stroke="url(#dividerGrad)" stroke-width="2" filter="url(#lineGlow)"/>

  <!-- Subtitle text -->
  <text x="500" y="158" text-anchor="middle" font-family="'Fira Code', 'Cascadia Code', 'Consolas', monospace" font-size="20" fill="#64ffda" letter-spacing="3" opacity="0.9">Full Stack Web Developer</text>

  <!-- Bottom edge line -->
  <line x1="0" y1="219" x2="1000" y2="219" stroke="#112240" stroke-width="1" opacity="0.5"/>
</svg>
